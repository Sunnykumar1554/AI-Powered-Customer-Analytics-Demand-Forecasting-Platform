# ── Render Blueprint ──
# Deploys the Streamlit dashboard as a Python web service

services:
  - type: web
    name: retailpulse
    runtime: python
    region: oregon

    # Build
    buildCommand: pip install -r requirements.txt

    # Start the Streamlit app on Render's dynamic $PORT
    startCommand: streamlit run streamlit_app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true --browser.gatherUsageStats=false

    # Use the free plan
    plan: free

    # Environment variables
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      - key: STREAMLIT_BROWSER_GATHER_USAGE_STATS
        value: "false"

    # Health check
    healthCheckPath: /_stcore/health

    # Auto-deploy on push to main
    autoDeploy: true
